<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pando Connect - Communication Matching</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a1a;
            --accent: #ff4757;
            --gold: #f1c40f;
            --success: #2ed573;
            --bg: #1a1a1a;
            --text-white: #ffffff;
            --gray: #2d3436;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text-white); overflow: hidden; height: 100vh; width: 100vw; display: flex; flex-direction: column; }

        /* Header */
        .header { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 1000; position: absolute; top: 0; width: 100%; }
        .back-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; padding: 10px; }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; text-decoration: none; color: white; }

        /* Scanning Container */
        .matching-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 20px; }

        /* Radar Animation */
        .radar { position: relative; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(255, 71, 87, 0.1) 0%, rgba(26, 26, 26, 1) 70%); border: 1px solid rgba(255, 71, 87, 0.2); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .radar::before { content: ""; position: absolute; width: 100%; height: 100%; background: conic-gradient(from 0deg, rgba(255, 71, 87, 0.4) 0deg, transparent 90deg); animation: scan 3s linear infinite; border-radius: 50%; }
        .radar-circle { position: absolute; border: 1px solid rgba(255, 71, 87, 0.2); border-radius: 50%; }
        .circle-1 { width: 100px; height: 100px; }
        .circle-2 { width: 200px; height: 200px; }

        @keyframes scan { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .center-user { position: relative; width: 70px; height: 70px; border-radius: 50%; border: 3px solid var(--gold); overflow: hidden; z-index: 10; box-shadow: 0 0 20px var(--gold); }
        .center-user img { width: 100%; height: 100%; object-fit: cover; }

        /* Flying Avatars */
        .avatar { position: absolute; width: 40px; height: 40px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); opacity: 0; }
        .avatar.active { opacity: 1; transition: all 0.5s ease; }

        /* Matching Text */
        .status-text { margin-top: 40px; text-align: center; }
        .status-text h2 { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--gold); margin-bottom: 8px; letter-spacing: 2px; }
        .status-text p { font-size: 14px; opacity: 0.6; }

        /* Result Card */
        .result-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .result-card { background: white; width: 100%; max-width: 320px; border-radius: 30px; overflow: hidden; color: var(--primary); animation: popUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .card-header { height: 120px; background: var(--primary); display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 20px; position: relative; }
        .expert-avatar { width: 80px; height: 80px; border-radius: 50%; border: 4px solid white; position: absolute; bottom: -40px; background: #eee; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .expert-avatar img { width: 100%; height: 100%; object-fit: cover; }

        .card-body { padding: 50px 20px 30px; text-align: center; }
        .card-body h3 { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
        .expert-rank { background: #fff5f6; color: var(--accent); font-size: 11px; font-weight: 900; padding: 4px 12px; border-radius: 20px; display: inline-block; margin-bottom: 15px; border: 1px solid #ffccd2; }
        .expert-desc { font-size: 13px; color: #666; margin-bottom: 25px; line-height: 1.5; }

        .action-btns { display: flex; flex-direction: column; gap: 12px; }
        .btn { padding: 14px; border-radius: 12px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; text-decoration: none; display: block; text-align: center; }
        .btn-chat { background: var(--success); color: white; box-shadow: 0 4px 12px rgba(46, 213, 115, 0.3); }
        .btn-cancel { background: #f8f9fa; color: #999; font-size: 13px; font-weight: 600; margin-top: 10px; }

        .confetti { position: absolute; width: 10px; height: 10px; background: var(--gold); border-radius: 2px; }
    </style>
</head>
<body>
    <header class="header">
        <button class="back-btn" onclick="history.back()">←</button>
        <a href="index.html" class="logo">Pando Connect</a>
        <div style="width: 44px;"></div>
    </header>

    <div class="matching-container">
        <div class="radar">
            <div class="radar-circle circle-1"></div>
            <div class="radar-circle circle-2"></div>
            <div class="center-user">
                <img src="https://picsum.photos/seed/user/100/100" alt="Me">
            </div>
            
            <!-- Floating Avatars placeholders -->
            <div id="avatar-container"></div>
        </div>

        <div class="status-text">
            <h2 id="status-title">CONNECTING...</h2>
            <p id="status-desc">Scanning for active experts in your area</p>
        </div>
    </div>

    <!-- Result Modal -->
    <div class="result-overlay" id="resultModal">
        <div class="result-card">
            <div class="card-header">
                <div style="color:var(--gold); font-family:'Bebas Neue'; font-size: 24px; letter-spacing:1px;">SUCCESS MATCHED!</div>
                <div class="expert-avatar">
                    <img id="matched-img" src="https://picsum.photos/seed/expert1/100/100" alt="Expert">
                </div>
            </div>
            <div class="card-body">
                <h3 id="matched-name">Pando Expert Lin</h3>
                <div class="expert-rank" id="matched-rank">⭐ Star Level Partner</div>
                <p class="expert-desc">"I have helped 50+ people reach their $10,000/year goal. Let's work together!"</p>
                
                <div class="action-btns">
                    <a href="https://t.me/pando_support" class="btn btn-chat">Connect on Telegram</a>
                    <button class="btn btn-cancel" onclick="location.reload()">Match Again</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const experts = [
            { name: "Expert John", rank: "Expert Level (20 Friends)", img: "https://picsum.photos/seed/john/100/100" },
            { name: "Director Srey", rank: "Director Level (100 Friends)", img: "https://picsum.photos/seed/srey/100/100" },
            { name: "Star David", rank: "Star Level Partner", img: "https://picsum.photos/seed/david/100/100" },
            { name: "Leader Kim", rank: "Expert Level Partner", img: "https://picsum.photos/seed/kim/100/100" }
        ];

        const container = document.getElementById('avatar-container');
        const avatars = [];

        // Create random avatars
        for(let i=0; i<8; i++) {
            const av = document.createElement('div');
            av.className = 'avatar';
            const img = document.createElement('img');
            img.src = `https://picsum.photos/seed/a${i}/100/100`;
            img.style.width = '100%';
            img.style.height = '100%';
            img.style.borderRadius = '50%';
            av.appendChild(img);
            container.appendChild(av);
            avatars.push(av);
            
            // Random position around the center
            const angle = Math.random() * Math.PI * 2;
            const dist = 100 + Math.random() * 50;
            av.style.left = `calc(50% + ${Math.cos(angle) * dist}px - 20px)`;
            av.style.top = `calc(50% + ${Math.sin(angle) * dist}px - 20px)`;
        }

        // Animation logic
        let count = 0;
        const interval = setInterval(() => {
            // Flash random avatars
            const idx = Math.floor(Math.random() * avatars.length);
            avatars[idx].classList.add('active');
            setTimeout(() => avatars[idx].classList.remove('active'), 400);

            count++;
            if(count > 15) {
                clearInterval(interval);
                showResult();
            }
        }, 300);

        function showResult() {
            const statusTitle = document.getElementById('status-title');
            const statusDesc = document.getElementById('status-desc');
            const resultModal = document.getElementById('resultModal');
            
            statusTitle.textContent = "MATCH FOUND!";
            statusDesc.textContent = "Connecting you with a top leader...";

            setTimeout(() => {
                const randomExpert = experts[Math.floor(Math.random() * experts.length)];
                document.getElementById('matched-name').textContent = randomExpert.name;
                document.getElementById('matched-rank').textContent = randomExpert.rank;
                document.getElementById('matched-img').src = randomExpert.img;
                
                resultModal.style.display = 'flex';
            }, 1000);
        }
    </script>
</body>
</html>
