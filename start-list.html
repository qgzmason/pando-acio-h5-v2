<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>All Products - pando</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a1a;
            --secondary: #333333;
            --accent: #ff6b6b;
            --success: #10b981;
            --bg-main: #ffffff;
            --bg-light: #f5f5f5;
            --bg-card: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --text-muted: #999999;
            --border: #e5e5e5;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.1);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-main);
            color: var(--text-primary);
            padding-top: 56px;
            min-height: 100vh;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 16px;
            z-index: 1000;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            padding: 8px;
            margin-right: 8px;
            display: flex;
            align-items: center;
        }

        .header-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            color: var(--primary);
            letter-spacing: 1px;
            flex: 1;
        }

        /* Grid Layout */
        .products-grid {
            padding: 16px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .product-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .product-card:active {
            transform: scale(0.98);
        }

        .product-img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-bottom: 1px solid var(--border);
        }

        .product-info {
            padding: 10px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
            height: 36px;
        }

        .product-price-row {
            display: flex;
            align-items: baseline;
            gap: 6px;
            margin-bottom: 8px;
        }

        .product-price {
            font-size: 16px;
            font-weight: 700;
            color: var(--accent);
        }

        .product-original {
            font-size: 11px;
            color: var(--text-muted);
            text-decoration: line-through;
        }

        .start-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            width: 100%;
        }

        .badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: var(--accent);
            color: white;
            font-size: 9px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-wrapper {
            position: relative;
        }
    </style>
</head>
<body>
    <header class="header">
        <button class="back-btn" onclick="history.back()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:24px;height:24px;"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <h1 class="header-title">All Products</h1>
    </header>

    <main class="products-grid" id="productsContainer">
        <!-- Rendered by JS -->
    </main>

    <script>
        const products = [
            { id: 101, title: "iPhone 15 Pro, 256GB, Natural Titanium", price: 899, original: 1199, image: "https://images.unsplash.com/photo-1696446701796-da61225697cc?w=400", hot: true },
            { id: 102, title: "Sony WH-1000XM5 Noise Cancelling Headphones", price: 299, original: 399, image: "https://images.unsplash.com/photo-1618366712277-70f398a58221?w=400", hot: false },
            { id: 103, title: "Nike Air Force 1 '07 - Triple White", price: 65, original: 110, image: "https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a?w=400", hot: true },
            { id: 104, title: "Dyson V15 Detect Cordless Vacuum", price: 450, original: 749, image: "https://images.unsplash.com/photo-1558317374-067fb5f30001?w=400", hot: false },
            { id: 105, title: "Samsung 55\" QLED 4K Smart TV", price: 699, original: 999, image: "https://images.unsplash.com/photo-1593359677777-a412dec20d18?w=400", hot: false },
            { id: 106, title: "MacBook Air M2, 8GB RAM, 256GB SSD", price: 849, original: 1099, image: "https://images.unsplash.com/photo-1611186871348-b1ec696e52c9?w=400", hot: true },
            { id: 107, title: "Apple Watch Series 9 GPS + Cellular", price: 399, original: 499, image: "https://images.unsplash.com/photo-1546868871-7041f2a55e12?w=400", hot: false },
            { id: 108, title: "Nintendo Switch – OLED Model", price: 280, original: 349, image: "https://images.unsplash.com/photo-1612036782180-6f0b6cd846fe?w=400", hot: true }
        ];

        function renderProducts() {
            const container = document.getElementById('productsContainer');
            container.innerHTML = products.map(product => `
                <div class="card-wrapper" onclick="location.href='product-detail.html?id=${product.id}'">
                    ${product.hot ? '<span class="badge">HOT</span>' : ''}
                    <div class="product-card">
                        <img src="${product.image}" alt="${product.title}" class="product-img">
                        <div class="product-info">
                            <div>
                                <h3 class="product-title">${product.title}</h3>
                                <div class="product-price-row">
                                    <span class="product-price">$${product.price}</span>
                                    <span class="product-original">$${product.original}</span>
                                </div>
                            </div>
                            <button class="start-btn">Start Group</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        renderProducts();
    </script>
</body>
</html>
